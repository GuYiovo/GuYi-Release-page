  <!-- 独立功能 JS（包含随机句子和内嵌音乐播放控制） -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 1. 随机句子功能
      const quotes = [
        "我对你何止半分真心",
        "願得一人心 白首不分離",
        "再也见不到我了 你不后悔吗",
        "我很爱我的女朋友 她笑得真的很甜",
        "你的爱像是慢性毒药",
        "世界给你多少偏见 我就给你多少偏爱",
        "而我已经分不清 你是友情 还是错过的爱情",
        "我刻舟早就不为求剑了",
        "如果再遇到爱的人 记得去拉住她的手",
        "我發誓一定要成為她的caesar",
        "过往不咎。",
        "送君茉莉 愿君莫离",
        "任武林谁领风骚 我却只为你折腰",
        "不求功成名就 但求人如当年",
        "直到和你相遇那刻 我才稱之為命運",
        "赠君茉莉，劝君莫离，若君不离，何需茉莉",
        "任武林谁独领风骚，我却只为你折腰",
        "你回眸多娇 我泪中带笑",
        "我可以对天发誓 绝不会让你一个人孤苦伶仃",
        "不求功成名就 但求人如当年",
        "时间冲淡了我们之间的回忆",
        "顺其自然",
        "再见的意思是一定会再次相见",
        "你对谁都好的话 就别对我好了"
      ];

      const randomIndex = Math.floor(Math.random() * quotes.length);
      const textContainer = document.getElementById('random-quotes');
      if (textContainer) {
        textContainer.innerText = quotes[randomIndex];
      }

      // 2. 播放器控制功能
      const musicWidget = document.getElementById('music-widget');
      const bgMusic = document.getElementById('bg-music');
      const musicStatus = document.getElementById('music-status');

      if (musicWidget && bgMusic) {
        // 音量默认设置为 30%，舒适不扰人
        bgMusic.volume = 0.3;

        musicWidget.addEventListener('click', () => {
          if (bgMusic.paused) {
            bgMusic.play().then(() => {
              musicWidget.classList.add('playing');
              musicStatus.innerText = '正在播放';
            }).catch((err) => {
              console.log("浏览器限制自动播放: ", err);
            });
          } else {
            bgMusic.pause();
            musicWidget.classList.remove('playing');
            musicStatus.innerText = '点击播放';
          }
        });
      }

      // 3. 移动端动态DOM脱离防卡片遮挡逻辑
      const pcWidgetContainer = document.getElementById('pc-widget-container');
      
      function checkMobileFloat() {
        if (!musicWidget || !pcWidgetContainer) return;
        
        // 当屏幕宽度 <= 768px 时，将播放器抽离到 body，做绝对悬浮
        if (window.innerWidth <= 768) {
          if (musicWidget.parentElement !== document.body) {
            document.body.appendChild(musicWidget);
            musicWidget.classList.add('mobile-float');
          }
        } else {
          // PC端还原到原卡片内部位置
          if (musicWidget.parentElement !== pcWidgetContainer) {
            pcWidgetContainer.appendChild(musicWidget);
            musicWidget.classList.remove('mobile-float');
          }
        }
      }

      // 初始执行 & 监听窗口变化
      checkMobileFloat();
      window.addEventListener('resize', checkMobileFloat);
    });
  </script>
